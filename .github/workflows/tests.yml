# ABOUTME: GitHub Actions workflow for running pytest on push and pull requests
# ABOUTME: Tests on multiple Python versions and operating systems

name: Tests

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    test:
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, macos-latest, windows-latest]
                python-version: ['3.11', '3.12', '3.13']

        steps:
            - uses: actions/checkout@v4

            - name: Set up Python ${{ matrix.python-version }}
              uses: actions/setup-python@v5
              with:
                  python-version: ${{ matrix.python-version }}

            - name: Install uv
              uses: astral-sh/setup-uv@v5

            - name: Install dependencies
              run: |
                  uv pip install --system -e ".[dev]"

            - name: Locate jaff data dir
              id: datadir
              shell: bash
              run: |
                  dir=$(python -c 'import jaff, os; print(os.path.join(os.path.dirname(jaff.__file__), "data"))')
                  echo "dir=$dir" >> "$GITHUB_OUTPUT"

            - name: Cache downloaded xsec/shielding data
              uses: actions/cache@v4
              with:
                  path: ${{ steps.datadir.outputs.dir }}
                  key: jaff-data-${{ matrix.os }}-${{ matrix.python-version }}-${{ hashFiles('src/jaff/registry.txt') }}
                  restore-keys: |
                      jaff-data-${{ matrix.os }}-${{ matrix.python-version }}-

            - name: Run tests with pytest
              run: |
                  uv run pytest tests/ -v --cov=jaff --cov-report=xml --cov-report=term

            - name: Upload coverage to Codecov
              if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
              uses: codecov/codecov-action@v4
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
                  file: ./coverage.xml
                  flags: unittests
                  name: codecov-umbrella
                  fail_ci_if_error: false
